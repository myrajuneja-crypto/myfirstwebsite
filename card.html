<!DOCTYPE html>

<!-- Tells the browser this is an html document-->
<html>
<head>   
<!-- Title to be shown in browser tab-->
<title> Induvidual Profile Tab</title>
<style>
/* Going to style the entire webpage */
body{
/* Background color of the page */
background-color:lavenderblush;
/* Text font */
font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
/* Centre code horizontally */
text-align: center;
/* Space from the top */
padding-top: 50px;
}
/* Main Card Container */
.card{



    /* white card backgroup */
    background-color: antiquewhite;


    /* width of the card */
    width: 350px;

    /* centres of the card */
    margin: auto;

    /* space inside the card */
    padding: 20px;
    /* Rounded corners */
    border-radius: 20 px;

    /* shadow around the card */
    box-shadow: 0px 5px 20px; 

    /* smooth animation effect */
    transition: 0.5s;
}

    /* Card hover Effect */
    .card:hover{
    /* Card slightly moves up */
    transform: translateY(-10px);
    }

/* Profile image styling */
img{
    /* width of the image */
    width: 150px;

    /* makes image circular */
    border-radius: 100%;

    /* blue border around the image */
    border: 5px palevioletred;
}

    /* Heading styling */
h1{
    /* Text color */

}

/* paragraph styling */
p{
    /* Text Color */
    color:hotpink
}

/* Button Styling */
button{
    /* background color */
    background-color:lightpink;

    /* Text Color */
    color:lavenderblush;

    /* remove border */
    border: none;

    /* space inside the button */
    padding: 12px 25px;

    /* rounded button */
    border-radius: 15px;

    /* Mouse Pointer */
    cursor: pointer;

    /* font size */
    font-size: 16px;

    /* Animation */
    transition: 0.3s;
}

/* button Hover */
button:hover{
    /* darker color */
    background-color:lavenderblush;
    
    /* slight zoom */
    transform: scale(1.1)
}

</style>
</head>

<body>
    <!-- card starts here-->
     <div class="card">
         <!-- profile image-->
          <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQraLY6BMOxhtCP6pcfdKJ5DZaagzaqbbnhtas9hk-4-w&s=10"

          
           <h1>myra juneja</h1>
           
           <!-- Description-->
            <p>
             artist, class of 2030 <3
            </p>

            <!-- Button-->
              <button>
                follow me
              </button>
    </div>
</body>
</html>
